{{ define "main" }}
<content>
  <ul class="blog-posts">
    {{ range (where .Site.RegularPages "Section" "blog") }}
    <li>
      <div class="post-title-row">
        <span>
          <i>
            <time datetime='{{ .Date.Format "2006-01-02" }}'>
              {{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}
            </time>
          </i>
        </span>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </div>
      {{ if .Params.summary }}
      <p>{{ .Params.summary }}</p>
      {{ end }}
    </li>
    {{ else }}
    <li>No posts yet</li>
    {{ end }}
  </ul>
</content>
{{ end }}
